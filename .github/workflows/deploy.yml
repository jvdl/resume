name: "Deployment"

on:
  workflow_dispatch:

concurrency:
  # Ensure only one deployment is running at a time
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
      - name: Setup
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: "Install fontist"
        uses: fontist/setup-fontist@v2
      - name: "Install Roboto font"
        run: fontist install "Roboto"
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Generate PDF
        run: npm run generate-pdf
      - name: Copy PDF to dist
        run: cp public/files/john-van-der-loo-resume.pdf
          dist/files/john-van-der-loo-resume.pdf
      - name: Deploy to Siteground via FTP
        uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a #v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: dist/
